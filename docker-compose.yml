version: "3"

services:
  db:
    image: postgres:18
    container_name: newlife-postgres
    restart: always
    ports:
      - "5434:5432"
    volumes:
      - ".tmp/pg18/data:/var/lib/postgresql"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
  redis:
    image: redis:latest
    container_name: newlife-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - ".tmp/redis/data:/data"
