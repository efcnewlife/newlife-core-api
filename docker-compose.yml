version: "3"

services:
  db:
    image: postgres:17
    container_name: newlife-postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ".tmp/pg17/data:/var/lib/postgresql/data"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
  redis:
    image: redis:latest
    container_name: newlife-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ".tmp/redis/data:/data"
