<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{APP_NAME}} API Docs</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
    <main class="mx-auto flex min-h-screen w-full max-w-3xl items-center px-4 py-10">
      <section class="w-full rounded-xl border border-slate-200 bg-white p-6 shadow-lg sm:p-8">
        <h1 class="text-2xl font-semibold tracking-tight">{{APP_NAME}} API Docs</h1>
        <p class="mt-3 text-sm leading-6 text-slate-600 sm:text-base">
          Select the API docs scope you want to browse.
        </p>
        <div class="mt-6 grid gap-3">
          <a
            href="/docs"
            class="block rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 transition hover:border-blue-300 hover:bg-blue-50"
          >
          Public API Docs
          <span class="mt-1 block text-sm text-blue-600">/docs</span>
          </a>
          <a
            href="/admin/docs"
            class="block rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 transition hover:border-blue-300 hover:bg-blue-50"
          >
          Admin API Docs
          <span class="mt-1 block text-sm text-blue-600">/admin/docs</span>
          </a>
          <a
            href="/api/docs"
            class="block rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 transition hover:border-blue-300 hover:bg-blue-50"
          >
          App API Docs
          <span class="mt-1 block text-sm text-blue-600">/api/docs</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
